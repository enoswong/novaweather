<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaWeather API 文件 v1.0.0</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #topbar a {
      color: #58a6ff;
      text-decoration: none;
      font-size: .85rem;
    }
    #topbar a:hover { text-decoration: underline; }
    #topbar .title {
      font-weight: 600;
      font-size: .95rem;
      color: #e6edf3;
      flex: 1;
    }
    #topbar .badge {
      background: #238636;
      color: #fff;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: .75rem;
      font-weight: 600;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      font-size: 1rem;
      color: #8b949e;
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none;
      margin: 40px auto;
      max-width: 600px;
      background: #3d1f1f;
      border: 1px solid #f8514933;
      border-radius: 8px;
      padding: 20px 24px;
      color: #ffa198;
    }
    .markdown-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      /* override github-markdown-css dark vars */
      --color-canvas-default: #0d1117;
      --color-fg-default: #e6edf3;
      --color-border-default: #30363d;
      --color-border-muted: #21262d;
      --color-accent-fg: #58a6ff;
      --color-neutral-muted: #6e768166;
      background: transparent;
    }
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 { border-bottom-color: #30363d; }
    .markdown-body code,
    .markdown-body pre { background: #161b22; }
    .markdown-body pre { border: 1px solid #30363d; }
    .markdown-body table { display: table; width: 100%; }
    .markdown-body table th,
    .markdown-body table td { border-color: #30363d; }
    .markdown-body blockquote { border-left-color: #3d444d; color: #8b949e; }
    .markdown-body a { color: #58a6ff; }
    #back-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: .8rem;
      cursor: pointer;
      display: none;
      text-decoration: none;
    }
    #back-top:hover { background: #30363d; }
  </style>
</head>
<body>

<div id="topbar">
  <span class="title">☁ NovaWeather API 文件</span>
  <span class="badge">v1.0.0</span>
  <a href="../../index.html">← 返回 Dashboard</a>
</div>

<div id="loading"><div class="spinner"></div>載入文件中…</div>
<div id="error"></div>
<article id="content" class="markdown-body" style="display:none"></article>
<a id="back-top" href="#" title="Back to top">▲ Top</a>

<script>
  marked.setOptions({ gfm: true, breaks: false });

  fetch('./novaweather_api_doc.md')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(md => {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('content');
      el.innerHTML = marked.parse(md);
      el.style.display = 'block';
      // syntax-highlight code blocks with simple class mapping
      el.querySelectorAll('pre code').forEach(block => {
        block.style.display = 'block';
        block.style.overflowX = 'auto';
      });
      // update title from first h1
      const h1 = el.querySelector('h1');
      if (h1) document.title = h1.textContent;
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      const errEl = document.getElementById('error');
      errEl.style.display = 'block';
      errEl.textContent = '無法載入文件：' + err.message;
    });

  // Back to top button
  window.addEventListener('scroll', () => {
    document.getElementById('back-top').style.display =
      window.scrollY > 400 ? 'block' : 'none';
  });
</script>
</body>
</html>
